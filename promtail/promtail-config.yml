server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container adını "service" etiketi olarak kullan (Grafana'da filtrelemek icin)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'service'
