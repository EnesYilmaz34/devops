server.port=8081
spring.application.name=user-service

# PostgreSQL baglantisi - degerler ENV degiskenlerinden gelir (docker-compose'da tanimli)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/userdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT ayarlari - secret production'da mutlaka ENV/Secret ile verilmeli
jwt.secret=${JWT_SECRET:cok-gizli-bir-anahtar-en-az-32-karakter-olmali-12345}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Prometheus'un metrik okuyabilecegi endpoint'i aciyoruz
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}
