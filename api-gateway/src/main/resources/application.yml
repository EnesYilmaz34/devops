server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # add-to-simple-url-handler-mapping: true KRİTİK — bu olmadan preflight
      # (OPTIONS) istekleri DispatcherHandler seviyesinde CORS config'e ulaşmıyor
      # ve 403 ile reddediliyor, route filtresine hiç girmiyor.
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # /api/auth/** isteklerini User Service'e yönlendir
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        # /api/tasks/** isteklerini Task Service'e yönlendir
        - id: task-service
          uri: ${TASK_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/tasks/**

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
